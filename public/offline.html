<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — PrimeFS</title>
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: system-ui, sans-serif; background: #F3F3F4; color: #0A2240; }
    .card { text-align: center; padding: 2rem; }
    h1 { font-size: 1.25rem; font-weight: 600; color: #177245; }
    p { margin-top: 0.5rem; font-size: 0.875rem; opacity: 0.6; }
    button { margin-top: 1.5rem; padding: 0.5rem 1.5rem; border: none; border-radius: 0.5rem; background: #177245; color: white; font-weight: 600; font-size: 0.875rem; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h1>You're offline</h1>
    <p>Check your internet connection and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
